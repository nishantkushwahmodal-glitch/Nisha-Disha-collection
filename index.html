<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nisha Disha Collection</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f4f4f4;}
header{background:#111;color:white;display:flex;justify-content:space-between;padding:15px 30px;align-items:center;flex-wrap:wrap;}
header h2{font-size:22px;}
nav button{background:#ffd700;border:none;padding:8px 15px;cursor:pointer;border-radius:5px;margin:2px;}
.hero{height:60vh;background:url("https://static.vecteezy.com/system/resources/thumbnails/033/086/157/small_2x/generative-ai-cloth-store-aesthetic-background-of-clothes-hanging-on-hangers-muted-neutral-colors-photo.jpg") center/cover;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;text-shadow:2px 2px 5px black;text-align:center;}
.categories{display:flex;justify-content:center;gap:15px;margin:30px;flex-wrap:wrap;}
.cat{background:#111;color:white;padding:10px 20px;border-radius:20px;cursor:pointer;}
.products{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:20px;}
.product-card{width:220px;background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.product-card img{width:100%;height:250px;object-fit:cover;}
.product-info{padding:10px;text-align:center;}
.product-info h3{font-size:18px;margin:5px 0;}
.product-info p{color:#b12704;font-weight:bold;}
.buy-btn{margin-top:8px;background:#25D366;color:white;border:none;padding:8px 15px;cursor:pointer;border-radius:5px;}
#adminPanel{display:none;background:#eee;padding:30px;text-align:center;}
#adminPanel input,#adminPanel select{padding:8px;width:200px;margin:5px;}
</style>
</head>
<body>

<header>
  <h2>Nisha Disha Collection</h2>
  <nav>
    <button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
    <button onclick="toggleWishlistBox()">Wishlist ❤️</button>
    <button onclick="showAdmin()">Admin Panel</button>
  </nav>
</header>

<!-- 🛒 Cart Box -->
<div id="cartBox" style="position:fixed;right:20px;top:80px;width:300px;background:white;box-shadow:0 5px 20px rgba(0,0,0,0.3);padding:15px;display:none;z-index:999;">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <button onclick="sendOrder()" style="margin-top:10px;background:#25D366;color:white;border:none;padding:8px 12px;border-radius:5px;">
    Order on WhatsApp
  </button>
</div>

<!-- Wishlist Box -->
<div id="wishlistBox" style="position:fixed;right:340px;top:80px;width:300px;background:white;box-shadow:0 5px 20px rgba(0,0,0,0.3);padding:15px;display:none;z-index:999;">
  <h3>Your Wishlist ❤️</h3>
</div>

<section class="hero">
  <h1>Trendy Fashion Store</h1>
  <p>Best Clothes For Everyone</p>
</section>

<div style="text-align:center;margin:20px;">
<input type="text" id="searchInput" placeholder="Search product..." onkeyup="searchProduct()" style="padding:8px;width:220px;border-radius:5px;border:1px solid gray;">
</div>

<div style="text-align:center;margin:10px;">
  <select id="sortPrice" onchange="sortProducts(this.value)" style="padding:6px 10px;border-radius:5px;border:1px solid gray;">
    <option value="">Sort by Price</option>
    <option value="low">Low to High</option>
    <option value="high">High to Low</option>
  </select>
</div>

<div class="categories">
  <div class="cat" onclick="showCategory('men')">Men</div>
  <div class="cat" onclick="showCategory('women')">Women</div>
  <div class="cat" onclick="showCategory('boys')">Boys</div>
  <div class="cat" onclick="showCategory('girls')">Girls</div>
</div>

<div id="productContainer" class="products"></div>

<div id="adminPanel">
<h2>Add Product</h2>
<input id="pname" placeholder="Product Name"><br>
<input id="pprice" placeholder="Price"><br>
<select id="pcategory">
<option value="men">Men</option>
<option value="women">Women</option>
<option value="boys">Boys</option>
<option value="girls">Girls</option>
</select><br>
<input type="file" id="pimage"><br>
<button onclick="addProduct()">Add Product</button>
</div>

<script>
let products = [];
let cart = [];
let wishlist = [];
let isAdmin = false;
let currentCategory = 'men';

const container = document.getElementById("productContainer");

function showAdmin(){
  let password = prompt("Enter Admin Password");
  if(password==="ndc123"){ isAdmin=true; document.getElementById("adminPanel").style.display="block"; showCategory(currentCategory); } 
  else { alert("Wrong Password"); }
}

function openCart(){
  const cartBox = document.getElementById("cartBox");
  cartBox.style.display = cartBox.style.display==='none'?'block':'none';
  updateCartUI();
}

function toggleWishlistBox(){
  const box = document.getElementById("wishlistBox");
  box.style.display = box.style.display==='none'?'block':'none';
  updateWishlistUI();
}

function addToCart(product){ cart.push(product); updateCartUI(); }
function removeFromCart(index){ cart.splice(index,1); updateCartUI(); }
function updateCartUI(){
  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";
  cart.forEach((p,i)=>{
    const div = document.createElement("div");
    div.style.display="flex"; div.style.justifyContent="space-between"; div.style.marginBottom="5px";
    div.innerHTML=`<span>${p.name} (₹${p.price})</span>
    <button onclick="removeFromCart(${i})" style="background:red;color:white;border:none;padding:2px 6px;border-radius:3px;cursor:pointer;">X</button>`;
    cartItems.appendChild(div);
  });
  document.getElementById("cartCount").innerText = cart.length;
}

function toggleWishlist(id,name,price,img){
  const idx = wishlist.findIndex(p=>p.id===id);
  if(idx===-1){ wishlist.push({id,name,price,img}); alert(`${name} added to Wishlist ❤️`);}
  else{ wishlist.splice(idx,1); alert(`${name} removed from Wishlist 💔`);}
  updateWishlistUI();
}

function updateWishlistUI(){
  const box = document.getElementById("wishlistBox");
  box.innerHTML = "<h3>Your Wishlist ❤️</h3>";
  wishlist.forEach(p=>{
    const div = document.createElement("div");
    div.style.display="flex"; div.style.alignItems="center"; div.style.justifyContent="space-between"; div.style.marginBottom="10px"; div.style.borderBottom="1px solid #ddd"; div.style.paddingBottom="5px";
    div.innerHTML = `<div style="display:flex;align-items:center;gap:10px;">
      <img src="${p.img}" style="width:50px;height:50px;object-fit:cover;border-radius:5px;">
      <span>${p.name} (₹${p.price})</span>
    </div>
    <button onclick="toggleWishlist('${p.id}','${p.name}','${p.price}','${p.img}')" style="background:red;color:white;border:none;padding:2px 6px;border-radius:3px;cursor:pointer;">X</button>`;
    box.appendChild(div);
  });
}

function showCategory(cat){
  currentCategory = cat;
  container.innerHTML="";
  let filtered = products.filter(p=>p.category===cat);
  filtered.forEach(p=>{
    const card = document.createElement("div"); card.className="product-card";
    card.innerHTML=`<img src="${p.img}">
      <div class="product-info">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="buy-btn" onclick="buyNow('${p.name}','${p.img}')">Buy Now</button>
        <button onclick="addToCart({name:'${p.name}',price:'${p.price}',img:'${p.img}'})" style="background:#ff9900;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">Add to Cart</button>
        <button onclick="toggleWishlist('${p.id}','${p.name}','${p.price}','${p.img}')" style="background:#ff4081;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">❤️ Wishlist</button>
        ${isAdmin?`<button onclick="deleteProduct('${p.id}')" style="background:red;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">Delete</button>`:''}
      </div>`;
    container.appendChild(card);
  });
}

function searchProduct(){
  const input = document.getElementById("searchInput").value.toLowerCase();
  if(!input){ showCategory(currentCategory); return; }
  const filtered = products.filter(p=>p.name.toLowerCase().includes(input));
  container.innerHTML="";
  filtered.forEach(p=>{
    const card = document.createElement("div"); card.className="product-card";
    card.innerHTML=`<img src="${p.img}">
      <div class="product-info">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="buy-btn" onclick="buyNow('${p.name}','${p.img}')">Buy Now</button>
        <button onclick="addToCart({name:'${p.name}',price:'${p.price}',img:'${p.img}'})" style="background:#ff9900;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">Add to Cart</button>
        <button onclick="toggleWishlist('${p.id}','${p.name}','${p.price}','${p.img}')" style="background:#ff4081;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">❤️ Wishlist</button>
        ${isAdmin?`<button onclick="deleteProduct('${p.id}')" style="background:red;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">Delete</button>`:''}
      </div>`;
    container.appendChild(card);
  });
}

function sortProducts(order){
  let filtered = products.filter(p=>p.category===currentCategory);
  if(order==="low"){ filtered.sort((a,b)=>a.price-b.price); }
  else if(order==="high"){ filtered.sort((a,b)=>b.price-a.price); }
  container.innerHTML="";
  filtered.forEach(p=>{
    const card = document.createElement("div"); card.className="product-card";
    card.innerHTML=`<img src="${p.img}">
      <div class="product-info">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="buy-btn" onclick="buyNow('${p.name}','${p.img}')">Buy Now</button>
        <button onclick="addToCart({name:'${p.name}',price:'${p.price}',img:'${p.img}'})" style="background:#ff9900;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">Add to Cart</button>
        <button onclick="toggleWishlist('${p.id}','${p.name}','${p.price}','${p.img}')" style="background:#ff4081;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">❤️ Wishlist</button>
        ${isAdmin?`<button onclick="deleteProduct('${p.id}')" style="background:red;color:white;border:none;padding:6px 10px;margin-top:5px;border-radius:5px;cursor:pointer;">Delete</button>`:''}
      </div>`;
    container.appendChild(card);
  });
}

function buyNow(name,img){
  const phone="919584951669";
  const msg=`Hi I want to buy\nProduct: ${name}\nImage: ${img}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// WhatsApp Order
function sendOrder(){
  if(cart.length===0){ alert("Cart is empty!"); return; }
  const phone="919584951669";
  const orderId='ORDER-'+Math.floor(Math.random()*10000);
  let msg=`Order ID: ${orderId}\nHi, I want to buy the following products:\n\n`;
  cart.forEach(p=>{ msg+=`Product: ${p.name}\nPrice: ₹${p.price}\nImage: ${p.img}\n\n`; });
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// Firebase + Imgbb
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyg_NbQH7U8IX5KR0V_HtzMMOS-3PbGow",
  authDomain: "nisha-disha-collection-1993e.firebaseapp.com",
  projectId: "nisha-disha-collection-1993e",
  storageBucket: "nisha-disha-collection-1993e.firebasestorage.app",
  messagingSenderId: "280558263721",
  appId: "1:280558263721:web:57dfc879836a4ff88378b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const imgbbAPI = "70e16ea19545c9b6b1bb80eaa1cd7872";

// Load products
async function loadProducts(){
  const snapshot = await getDocs(collection(db,"products"));
  products=[];
  snapshot.forEach(doc=>{
    const data = doc.data();
    products.push({id:doc.id,name:data.name,price:data.price,img:data.img,category:data.category});
  });
  showCategory(currentCategory);
}
loadProducts();

// Delete product
window.deleteProduct = async function(id){
  try{ await deleteDoc(doc(db,"products",id)); alert("Deleted"); loadProducts(); }
  catch(err){ alert("Delete Failed"); console.error(err); }
}

// Add product
window.addProduct = async function(){
  const name=document.getElementById("pname").value;
  const price=document.getElementById("pprice").value;
  const category=document.getElementById("pcategory").value;
  const imageFile=document.getElementById("pimage").files[0];
  if(!name||!price||!category||!imageFile){ alert("Fill all fields"); return; }

  const formData=new FormData();
  formData.append("image",imageFile);

  try{
    const response=await fetch(`https://api.imgbb.com/1/upload?key=${imgbbAPI}`,{method:"POST",body:formData});
    const data=await response.json();
    const imgURL=data.data.url;
    await addDoc(collection(db,"products"),{name,price,category,img:imgURL});
    await loadProducts();
    document.getElementById("pname").value="";
    document.getElementById("pprice").value="";
    document.getElementById("pimage").value="";
    alert("Product Added Successfully");
  }catch(err){ alert("Upload Failed"); console.error(err);}
}
</script>

<style>

  header{flex-direction:column;align-items:flex-start;padding:10px;}
  nav{width:100%;display:flex;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:5px;}
  .categories{flex-direction:column;gap:10px;margin:20px;align-items:center;}
  .product-card{max-width:90%;margin:0 auto;}
  .hero{height:40vh;padding:10px;text-align:center;}
  #cartBox,#wishlistBox{width:90%;right:5%;top:70px;}

  .product-card img{height:200px;}

@media (max-width:480px){

  .hero h1
